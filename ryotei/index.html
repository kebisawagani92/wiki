<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅程表カレンダー</title>
<style>
  :root{
    --bg:#f4f6f9; --card:#ffffff; --ink:#1a2230; --sub:#5b6675;
    --line:#e3e8ef; --accent:#0b6cbf; --accent-soft:#e8f2fb; --today:#c2410c;
  }
  @media (prefers-color-scheme: dark){
    :root{--bg:#0f141b; --card:#182029; --ink:#e8edf3; --sub:#9aa7b6;
      --line:#28323d; --accent:#4aa3e8; --accent-soft:#12283b; --today:#fb923c;}
  }
  :root[data-theme="light"]{--bg:#f4f6f9; --card:#ffffff; --ink:#1a2230; --sub:#5b6675;
    --line:#e3e8ef; --accent:#0b6cbf; --accent-soft:#e8f2fb; --today:#c2410c;}
  :root[data-theme="dark"]{--bg:#0f141b; --card:#182029; --ink:#e8edf3; --sub:#9aa7b6;
    --line:#28323d; --accent:#4aa3e8; --accent-soft:#12283b; --today:#fb923c;}
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,"Segoe UI",Roboto,sans-serif;
    line-height:1.6;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;}
  .wrap{max-width:600px;margin:0 auto;padding:18px 14px 60px;}
  header.top{padding:4px 4px 14px;}
  .kicker{font-size:12px;letter-spacing:.1em;color:var(--accent);font-weight:700;text-transform:uppercase;}
  h1{font-size:22px;margin:5px 0 0;font-weight:800;}

  .calnav{display:flex;align-items:center;justify-content:space-between;margin:8px 0 12px;}
  .calnav .m{font-size:19px;font-weight:800;}
  .calnav button{background:var(--card);border:1px solid var(--line);color:var(--ink);
    width:40px;height:40px;border-radius:12px;font-size:19px;cursor:pointer;line-height:1;}
  .calnav button:active{background:var(--accent-soft);}

  .grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:4px;}
  .dow{text-align:center;font-size:12px;font-weight:700;color:var(--sub);padding:4px 0;}
  .dow.sun{color:#e05656;} .dow.sat{color:#4a86e0;}
  .cell{aspect-ratio:1/1;border-radius:12px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;font-size:15px;position:relative;
    border:1px solid transparent;color:var(--ink);}
  .cell.blank{visibility:hidden;}
  .cell.sun{color:#e05656;} .cell.sat{color:#4a86e0;}
  .cell.today{border-color:var(--today);}
  .cell.trip{background:var(--accent);color:#fff;cursor:pointer;font-weight:800;
    border-color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.15);}
  .cell.trip.sun,.cell.trip.sat{color:#fff;}
  .cell.trip.rangestart{border-top-right-radius:4px;border-bottom-right-radius:4px;}
  .cell.trip.rangemid{border-radius:4px;}
  .cell.trip.rangeend{border-top-left-radius:4px;border-bottom-left-radius:4px;}
  .cell .dot{position:absolute;bottom:6px;width:5px;height:5px;border-radius:50%;background:#fff;opacity:.9;}

  .list{margin-top:22px;}
  .list h2{font-size:14px;font-weight:700;color:var(--sub);margin:0 0 8px;letter-spacing:.03em;}
  .trip{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:13px 15px;margin-bottom:9px;cursor:pointer;text-align:left;width:100%;
    color:var(--ink);font-family:inherit;}
  .trip:active{background:var(--accent-soft);}
  .trip .date{flex:0 0 auto;text-align:center;min-width:52px;}
  .trip .date .d{font-size:22px;font-weight:800;line-height:1;}
  .trip .date .my{font-size:11px;color:var(--sub);margin-top:3px;}
  .trip .info{flex:1 1 auto;min-width:0;}
  .trip .info .t{font-size:16px;font-weight:700;line-height:1.35;}
  .trip .info .r{font-size:12.5px;color:var(--sub);margin-top:2px;}
  .trip .arw{flex:0 0 auto;color:var(--sub);font-size:18px;}
  .empty{color:var(--sub);font-size:14px;padding:8px 2px;}

  /* setup / states */
  .box{max-width:460px;margin:14vh auto 0;padding:26px 24px;background:var(--card);
    border:1px solid var(--line);border-radius:12px;}
  .box h1{font-size:17px;margin:0 0 10px;}
  .box p{font-size:13px;color:var(--sub);margin:6px 0;}
  .box input{width:100%;padding:9px 10px;border-radius:6px;border:1px solid var(--line);
    background:var(--bg);color:var(--ink);font-size:13px;}
  .box button{margin-top:12px;padding:9px 18px;border:none;border-radius:6px;background:var(--accent);
    color:#fff;font-weight:600;font-size:13px;cursor:pointer;}
  .err{color:#e05656;font-size:12.5px;min-height:1em;}
  .muted{font-size:11.5px;color:var(--sub);}

  /* detail */
  #detail[hidden]{display:none;}
  #detail{position:fixed;inset:0;background:var(--bg);z-index:10;display:flex;flex-direction:column;}
  #detail .bar{flex:0 0 auto;padding:8px 12px;border-bottom:1px solid var(--line);background:var(--card);}
  #detail .bar button{background:transparent;border:none;color:var(--accent);font-size:16px;
    font-weight:700;cursor:pointer;padding:6px 4px;font-family:inherit;}
  #detail iframe{flex:1 1 auto;border:0;width:100%;}
</style>
</head>
<body>

<div class="box" id="setup" hidden>
  <h1>旅程表 ― アクセス設定</h1>
  <p>データ用リポジトリの読み取りトークン（fine-grained PAT）を入力してください。Wikiで設定済みのトークンがあれば自動で使用されます。</p>
  <input type="password" id="tok" placeholder="github_pat_...">
  <button id="go">保存して表示</button>
  <p class="err" id="err"></p>
  <p class="muted">トークンはこのブラウザのlocalStorageにのみ保存されます。</p>
</div>

<div class="box" id="loading"><h1>読み込み中…</h1></div>

<div class="wrap" id="app" hidden>
  <header class="top">
    <div class="kicker">Itinerary</div>
    <h1>旅程カレンダー</h1>
  </header>
  <div class="calnav">
    <button id="prev" aria-label="前の月">‹</button>
    <div class="m" id="monthLabel"></div>
    <button id="next" aria-label="次の月">›</button>
  </div>
  <div class="grid" id="grid"></div>
  <div class="list">
    <h2 id="listTitle">旅程一覧</h2>
    <div id="tripList"></div>
  </div>
</div>

<div id="detail" hidden>
  <div class="bar"><button id="back">‹ カレンダーに戻る</button></div>
  <iframe id="frame" referrerpolicy="no-referrer"></iframe>
</div>

<script>
(function(){
  var SRC={owner:'kebisawagani92', repo:'wiki-data', branch:'main'};
  var DOW=['日','月','火','水','木','金','土'];
  var el=function(id){return document.getElementById(id);};
  var trips=[], tripByDate={}, viewY, viewM;

  function token(){ return localStorage.getItem('ryoteiGhToken')||localStorage.getItem('wikiGhToken')||localStorage.getItem('cfGhToken')||''; }
  function showSetup(msg){ el('loading').hidden=true; el('app').hidden=true; el('setup').hidden=false; el('err').textContent=msg||''; }

  function ghGet(path, accept){
    var t=token();
    var url='https://api.github.com/repos/'+SRC.owner+'/'+SRC.repo+'/contents/'+path+'?ref='+SRC.branch+'&_='+Date.now();
    return fetch(url,{cache:'no-store', headers:{Authorization:'Bearer '+t, Accept:accept, 'If-None-Match':''}})
      .then(function(res){
        if(!res.ok) throw new Error('HTTP '+res.status+(res.status===401?'（トークン無効）':res.status===404?'（権限不足 or ファイルなし）':''));
        return res.text();
      });
  }

  function parseYMD(s){ var p=s.split('-'); return new Date(+p[0], +p[1]-1, +p[2]); }
  function ymd(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

  function buildIndex(){
    tripByDate={};
    trips.forEach(function(tr){
      var s=parseYMD(tr.start), e=parseYMD(tr.end||tr.start);
      for(var d=new Date(s); d<=e; d.setDate(d.getDate()+1)){
        tripByDate[ymd(d)]=tr;
      }
    });
  }

  function renderCalendar(){
    el('monthLabel').textContent=viewY+'年 '+(viewM+1)+'月';
    var g=el('grid'); g.innerHTML='';
    DOW.forEach(function(name,i){
      var h=document.createElement('div');
      h.className='dow'+(i===0?' sun':i===6?' sat':'');
      h.textContent=name; g.appendChild(h);
    });
    var first=new Date(viewY, viewM, 1);
    var start=first.getDay();
    var days=new Date(viewY, viewM+1, 0).getDate();
    var todayStr=ymd(new Date());
    for(var b=0;b<start;b++){ var bl=document.createElement('div'); bl.className='cell blank'; g.appendChild(bl); }
    for(var day=1; day<=days; day++){
      var d=new Date(viewY, viewM, day), key=ymd(d), dow=d.getDay();
      var c=document.createElement('div');
      c.className='cell'+(dow===0?' sun':dow===6?' sat':'');
      if(key===todayStr) c.className+=' today';
      var num=document.createElement('div'); num.textContent=day; c.appendChild(num);
      var tr=tripByDate[key];
      if(tr){
        c.className+=' trip';
        var isStart=(key===tr.start), isEnd=(key===(tr.end||tr.start));
        if(isStart&&isEnd){} else if(isStart){ c.className+=' rangestart'; }
        else if(isEnd){ c.className+=' rangeend'; } else { c.className+=' rangemid'; }
        var dot=document.createElement('div'); dot.className='dot'; c.appendChild(dot);
        (function(t){ c.addEventListener('click',function(){ openTrip(t); }); })(tr);
      }
      g.appendChild(c);
    }
    renderList();
  }

  function renderList(){
    var box=el('tripList'); box.innerHTML='';
    var title=el('listTitle'); if(title) title.textContent=(viewM+1)+'月の旅程';
    // この表示月に重なる旅程だけ抽出
    var mStart=new Date(viewY,viewM,1), mEnd=new Date(viewY,viewM+1,0);
    var inMonth=trips.filter(function(tr){
      var s=parseYMD(tr.start), e=parseYMD(tr.end||tr.start);
      return s<=mEnd && e>=mStart;
    }).sort(function(a,b){ return a.start<b.start?-1:a.start>b.start?1:0; });
    if(!inMonth.length){ box.innerHTML='<div class="empty">この月の旅程はありません。</div>'; return; }
    inMonth.forEach(function(tr){
      var s=parseYMD(tr.start);
      var row=document.createElement('button'); row.className='trip';
      var range=tr.end&&tr.end!==tr.start ? (s.getMonth()+1)+'/'+s.getDate()+'–'+(parseYMD(tr.end).getMonth()+1)+'/'+parseYMD(tr.end).getDate() : '';
      row.innerHTML='<div class="date"><div class="d">'+s.getDate()+'</div><div class="my">'+s.getFullYear()+'.'+(s.getMonth()+1)+'</div></div>'+
        '<div class="info"><div class="t"></div><div class="r"></div></div><div class="arw">›</div>';
      row.querySelector('.info .t').textContent=tr.title||'旅程';
      row.querySelector('.info .r').textContent=range?('('+range+')'):('('+DOW[s.getDay()]+')');
      row.addEventListener('click',function(){ openTrip(tr); });
      box.appendChild(row);
    });
  }

  function openTrip(tr){
    ghGet('ryotei/'+tr.file, 'application/vnd.github.raw+json')
      .then(function(html){
        el('frame').srcdoc=html;
        el('detail').hidden=false;
      })
      .catch(function(e){ alert('旅程の読み込みに失敗しました: '+e.message); });
  }

  el('back').addEventListener('click',function(){ el('detail').hidden=true; el('frame').srcdoc=''; });
  el('prev').addEventListener('click',function(){ viewM--; if(viewM<0){viewM=11;viewY--;} renderCalendar(); });
  el('next').addEventListener('click',function(){ viewM++; if(viewM>11){viewM=0;viewY++;} renderCalendar(); });

  function addPortalPill(){
    try{var a=document.createElement('a');a.href='../portal/';a.textContent='≡ ポータル';
      a.setAttribute('style','position:fixed;left:12px;bottom:12px;z-index:2147483000;font:600 12px sans-serif;color:#fff;background:rgba(47,157,127,.92);padding:7px 12px;border-radius:999px;text-decoration:none;box-shadow:0 2px 6px rgba(0,0,0,.3)');
      document.body.appendChild(a);}catch(e){}
  }

  function load(){
    if(!token()){ showSetup(''); return; }
    ghGet('ryotei/index.json','application/vnd.github.raw+json')
      .then(function(txt){
        var data=JSON.parse(txt);
        trips=data.trips||[];
        buildIndex();
        // default month = latest trip's start month, else current
        var focus=new Date();
        if(trips.length){ var latest=trips.map(function(t){return t.start;}).sort()[trips.length-1]; focus=parseYMD(latest); }
        viewY=focus.getFullYear(); viewM=focus.getMonth();
        renderCalendar();
        el('loading').hidden=true; el('setup').hidden=true; el('app').hidden=false;
        addPortalPill();
      })
      .catch(function(e){ showSetup('読み込み失敗: '+e.message); });
  }

  el('go').addEventListener('click',function(){
    var v=el('tok').value.trim();
    if(!v){ el('err').textContent='トークンを入力してください'; return; }
    localStorage.setItem('ryoteiGhToken',v);
    el('setup').hidden=true; el('loading').hidden=false; load();
  });

  load();
})();
</script>
</body>
</html>
